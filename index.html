<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kobra AO | Acesso ao Sistema</title>
    
    <!-- Importação de fontes e ícones -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* Variáveis de Cores Profissionais */
        :root {
            --primary: #163172;
            --primary-dark: #0d1e46;
            --accent: #1e61f0;
            --bg-gray: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
        }

        /* Reset e Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-gray);
            background-image: radial-gradient(circle at 2px 2px, #e2e8f0 1px, transparent 0);
            background-size: 30px 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Principal */
        .container {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        /* Logo e Títulos */
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .icon-wrapper {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: white;
            font-size: 30px;
            box-shadow: 0 10px 15px rgba(22, 49, 114, 0.2);
            transform: rotate(-5deg);
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
        }

        /* Formulários */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            display: block;
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            background: var(--white);
            font-size: 15px;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(30, 97, 240, 0.08);
        }

        /* Botões */
        .btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Links Extras */
        .extra-links {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
        }

        .extra-links a {
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
            transition: 0.2s;
        }

        .extra-links a:hover {
            color: var(--primary);
        }

        /* Footer */
        .footer {
            margin-top: 35px;
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Animação de Transição */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <div class="icon-wrapper">
            <i class="fa-solid fa-wallet"></i>
        </div>
        <h1 id="main-title">Kobra AO</h1>
        <p id="dynamic-subtitle">Gestão financeira inteligente</p>
    </div>

    <!-- TELA DE LOGIN -->
    <div id="login-section" class="fade-in">
        <form onsubmit="return false;">
            <div class="form-group">
                <label>E-mail ou Telefone</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="login-user" placeholder="Digite seu acesso" required>
                </div>
            </div>

            <div class="form-group">
                <label>Palavra-passe</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-pass" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn">Entrar na Conta</button>
        </form>
        
        <div class="extra-links">
            <a href="javascript:void(0)" onclick="toggleView('register')">Não tem conta? <span>Registe-se</span></a>
        </div>
    </div>

    <!-- TELA DE REGISTRO -->
    <div id="register-section" class="fade-in" style="display: none;">
        <form onsubmit="return false;">
            <div class="form-group">
                <label>Nome Completo</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-signature"></i>
                    <input type="text" placeholder="Como devemos lhe chamar?" required>
                </div>
            </div>

            <div class="form-group">
                <label>E-mail ou WhatsApp</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" placeholder="Para validar sua conta" required>
                </div>
            </div>

            <div class="form-group">
                <label>Criar Palavra-passe</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-shield-halved"></i>
                    <input type="password" placeholder="Mínimo 6 caracteres" required>
                </div>
            </div>

            <button type="submit" class="btn" style="background: var(--success);">Confirmar Registo</button>
        </form>
        
        <div class="extra-links">
            <a href="javascript:void(0)" onclick="toggleView('login')">Já tem uma conta? <span>Fazer Login</span></a>
        </div>
    </div>

    <div class="footer">
        &copy; 2026 Kobra AO. Todos os direitos reservados.
    </div>
</div>

<script>
    function toggleView(view) {
        const loginSec = document.getElementById('login-section');
        const registerSec = document.getElementById('register-section');
        const subtitle = document.getElementById('dynamic-subtitle');

        if (view === 'register') {
            loginSec.style.display = 'none';
            registerSec.style.display = 'block';
            subtitle.innerText = 'Crie sua conta em poucos segundos';
        } else {
            registerSec.style.display = 'none';
            loginSec.style.display = 'block';
            subtitle.innerText = 'Gestão financeira inteligente';
        }
    }
</script>

</body>
</html>
